server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:

        # ── Public: User auth ────────────────────────────────────────────────
        - id: user-service-public
          uri: lb://user-service
          predicates:
            - Path=/api/users/register, /api/users/login, /api/users/refresh
          # No JwtAuth filter — these are the login/register endpoints

        # ── Protected: User profile ──────────────────────────────────────────
        - id: user-service-protected
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
          filters:
            - JwtAuth

        # ── Recipes (public browse, protected cart/order actions) ────────────
        - id: recipe-service-public
          uri: lb://recipe-service
          predicates:
            - Path=/api/recipes/**
            - Method=GET
          # GET requests are public — browse without login

        - id: recipe-service-protected
          uri: lb://recipe-service
          predicates:
            - Path=/api/recipes/**
          filters:
            - JwtAuth
          # POST/PUT/DELETE require auth

        # ── Orders ───────────────────────────────────────────────────────────
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/orders/**
          filters:
            - JwtAuth

        # ── Inventory ────────────────────────────────────────────────────────
        - id: inventory-service
          uri: lb://inventory-service
          predicates:
            - Path=/api/inventory/**
          filters:
            - JwtAuth

        # ── Payments ─────────────────────────────────────────────────────────
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/payments/**
          filters:
            - JwtAuth

        # ── Admin (ADMIN role only — enforce in the service itself too) ──────
        - id: admin-service
          uri: lb://admin-service
          predicates:
            - Path=/api/admin/**
          filters:
            - JwtAuth

# JWT secret — injected from environment variable, never hardcoded
jwt:
  secret: ${JWT_SECRET}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: ${EUREKA_INSTANCE_PREFER_IP_ADDRESS:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
